name: couple_companion
description: 情侣陪伴互动APP - Hello Kitty粉色主题
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.0

  # 网络
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # 本地存储
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI 组件
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # 工具
  image_picker: ^1.1.2
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.1
  permission_handler: ^11.3.1
  amap_flutter_location: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
